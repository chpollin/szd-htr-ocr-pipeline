<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZD-HTR-OCR-Pipeline — Transkriptionsergebnisse</title>
    <style>
        :root {
            --bg: #fafaf8;
            --text: #2c2c2c;
            --accent: #8b5e3c;
            --border: #d4c5b0;
            --card-bg: #fff;
            --tag-bg: #f0e8dc;
            --high: #4a7c59;
            --medium: #b8860b;
            --low: #a0522d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: normal;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
        }
        h1 span { font-size: 0.9rem; color: #888; }
        .subtitle {
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .subtitle a { color: var(--accent); }
        h2 {
            font-size: 1.2rem;
            font-weight: normal;
            color: var(--accent);
            margin: 2.5rem 0 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.3rem;
        }
        .object-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .object-header {
            background: var(--tag-bg);
            padding: 0.8rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .object-header h3 {
            font-size: 1.05rem;
            font-weight: 600;
        }
        .tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .tag {
            font-size: 0.75rem;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-family: 'Consolas', monospace;
        }
        .tag-group { background: #e3d5c5; color: #5a3e28; }
        .tag-lang { background: #d5e3e8; color: #2a4a5a; }
        .tag-confidence-high { background: #d4e8d4; color: var(--high); }
        .tag-confidence-medium { background: #f0e4c0; color: var(--medium); }
        .tag-confidence-low { background: #e8d4c4; color: var(--low); }
        .meta-row {
            padding: 0.5rem 1.2rem;
            font-size: 0.85rem;
            color: #666;
            border-bottom: 1px solid #eee;
        }
        .meta-row span { color: var(--text); }
        .page {
            padding: 1.2rem;
            border-bottom: 1px solid #eee;
        }
        .page:last-child { border-bottom: none; }
        .page-label {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .transcription {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.88rem;
            line-height: 1.8;
            white-space: pre-wrap;
            background: #faf8f5;
            padding: 1rem;
            border-radius: 3px;
            border-left: 3px solid var(--border);
        }
        .page-notes {
            font-size: 0.82rem;
            color: #888;
            margin-top: 0.5rem;
            font-style: italic;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1rem;
            text-align: center;
        }
        .stat-num {
            font-size: 2rem;
            color: var(--accent);
            font-weight: bold;
        }
        .stat-label { font-size: 0.85rem; color: #888; }
        footer {
            margin-top: 3rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: #999;
        }
        footer a { color: var(--accent); }
        del { color: #999; text-decoration: line-through; }
        .loading { text-align: center; padding: 3rem; color: #888; }
    </style>
</head>
<body>

<h1>SZD-HTR-OCR-Pipeline <span>Transkriptionsergebnisse</span></h1>
<p class="subtitle">
    VLM-basierte Transkription von Faksimiles aus dem
    <a href="https://stefanzweig.digital/">Stefan-Zweig-Nachlass</a>
    (Literaturarchiv Salzburg).<br>
    <a href="https://github.com/chpollin/szd-htr-ocr-pipeline">GitHub</a> &middot;
    <a href="viewer.html">Viewer</a>
</p>

<div class="stats" id="stats">
    <div class="loading">Lade Daten&hellip;</div>
</div>

<div id="content"></div>

<footer>
    <p>
        <a href="https://github.com/chpollin/szd-htr-ocr-pipeline">SZD-HTR-OCR-Pipeline</a> &mdash;
        Teilprojekt von <a href="https://stefanzweig.digital/">Stefan Zweig Digital</a>,
        Literaturarchiv Salzburg.
    </p>
</footer>

<script>
const COLLECTION_LABELS = {
    "lebensdokumente": "Lebensdokumente",
    "werke": "Werke",
    "aufsatzablage": "Aufsatzablage",
    "korrespondenzen": "Korrespondenzen"
};

function escapeHtml(text) {
    return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/~~(.+?)~~/g, '<del>$1</del>');
}

async function init() {
    let data;
    try {
        const resp = await fetch('data.json');
        data = await resp.json();
    } catch (e) {
        document.getElementById('stats').innerHTML =
            '<div class="loading">Fehler beim Laden der Daten.</div>';
        return;
    }

    const objects = data.objects || [];
    const collections = data.collections || [];

    // Unique groups and confidence counts
    const groups = new Set(objects.map(o => o.group + ': ' + o.groupLabel));
    const highCount = objects.filter(o => o.confidence === 'high').length;
    const models = new Set(objects.map(o => o.model).filter(Boolean));

    // Stats
    document.getElementById('stats').innerHTML = `
        <div class="stat-card">
            <div class="stat-num">${objects.length}</div>
            <div class="stat-label">Objekte getestet</div>
        </div>
        <div class="stat-card">
            <div class="stat-num">${highCount}/${objects.length}</div>
            <div class="stat-label">Confidence: high</div>
        </div>
        <div class="stat-card">
            <div class="stat-num">${collections.length}</div>
            <div class="stat-label">Sammlungen</div>
        </div>
        <div class="stat-card">
            <div class="stat-num">${groups.size}</div>
            <div class="stat-label">Prompt-Gruppen</div>
        </div>
    `;

    // Model info
    if (models.size > 0) {
        const subtitle = document.querySelector('.subtitle');
        subtitle.innerHTML += `<br>Modell: <strong>${[...models].join(', ')}</strong>`;
    }

    // Object cards grouped by collection
    const content = document.getElementById('content');
    let html = '';

    for (const col of collections) {
        const colObjects = objects.filter(o => o.collection === col);
        const colLabel = COLLECTION_LABELS[col] || col;
        html += `<h2>${colLabel} (${colObjects.length})</h2>`;

        for (const obj of colObjects) {
            const pages = obj.pages || [];
            const confClass = `tag-confidence-${obj.confidence || 'medium'}`;

            html += `<div class="object-card">`;
            html += `<div class="object-header">`;
            html += `<h3>${escapeHtml(obj.title || obj.label)}</h3>`;
            html += `<div class="tags">`;
            html += `<span class="tag tag-group">${obj.group}: ${obj.groupLabel}</span>`;
            if (obj.lang) html += `<span class="tag tag-lang">${escapeHtml(obj.lang)}</span>`;
            if (obj.confidence) html += `<span class="tag ${confClass}">${obj.confidence}</span>`;
            html += `</div></div>`;

            html += `<div class="meta-row">`;
            html += `<span>${obj.pid}</span>`;
            if (obj.model) html += ` &middot; ${escapeHtml(obj.model)}`;
            if (pages.length) html += ` &middot; ${pages.length} Seiten`;
            html += `</div>`;

            for (let i = 0; i < pages.length; i++) {
                const page = pages[i];
                html += `<div class="page">`;
                html += `<div class="page-label">Seite ${page.page || i + 1}</div>`;
                html += `<div class="transcription">${escapeHtml(page.transcription || '')}</div>`;
                if (page.notes) {
                    html += `<div class="page-notes">${escapeHtml(page.notes)}</div>`;
                }
                html += `</div>`;
            }

            html += `</div>`;
        }
    }

    content.innerHTML = html;
}

init();
</script>

</body>
</html>
