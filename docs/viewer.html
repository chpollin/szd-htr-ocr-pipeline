<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZD-HTR Viewer — Faksimile ↔ Transkription</title>
    <style>
        :root {
            --bg: #f5f3ef;
            --card: #fff;
            --accent: #8b5e3c;
            --border: #d4c5b0;
            --text: #2c2c2c;
            --muted: #888;
            --tag-a: #e8d5f0;
            --tag-b: #d5e0f0;
            --tag-c: #f0e4d0;
            --tag-d: #d5f0d8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        /* --- Header --- */
        header {
            background: var(--accent);
            color: #fff;
            padding: 0.8rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        header .sub { font-size: 0.75rem; opacity: 0.8; }

        /* --- Object selector --- */
        .selector {
            display: flex;
            gap: 0.4rem;
            padding: 0.6rem 1rem;
            overflow-x: auto;
            background: #fff;
            border-bottom: 1px solid var(--border);
            -webkit-overflow-scrolling: touch;
        }
        .selector button {
            flex-shrink: 0;
            padding: 0.4rem 0.7rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg);
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .selector button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* --- Meta bar --- */
        .meta {
            padding: 0.6rem 1rem;
            font-size: 0.78rem;
            color: var(--muted);
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 1rem;
        }
        .meta .tag {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            font-size: 0.72rem;
            font-weight: 600;
        }
        .tag-A { background: var(--tag-a); }
        .tag-B { background: var(--tag-b); }
        .tag-C { background: var(--tag-c); }
        .tag-D { background: var(--tag-d); }

        /* --- Page nav --- */
        .page-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            padding: 0.5rem;
            background: #fff;
            border-bottom: 1px solid var(--border);
        }
        .page-nav button {
            width: 2.5rem;
            height: 2.5rem;
            border: 1px solid var(--border);
            border-radius: 50%;
            background: #fff;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .page-nav button:disabled { opacity: 0.3; cursor: default; }
        .page-nav .page-info {
            font-size: 0.85rem;
            font-weight: 600;
            min-width: 5rem;
            text-align: center;
        }

        /* --- Main split view --- */
        .viewer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr;
            height: calc(100vh - 10rem);
            min-height: 400px;
        }

        .panel-label {
            padding: 0.3rem 1rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            background: #faf8f5;
            border-bottom: 1px solid var(--border);
        }
        .panel-label:nth-child(2) { border-left: 1px solid var(--border); }

        .img-panel {
            overflow: auto;
            background: #e8e4de;
            position: relative;
            -webkit-overflow-scrolling: touch;
        }
        .img-panel img {
            width: 100%;
            height: auto;
            display: block;
            cursor: zoom-in;
        }
        .img-panel img.zoomed {
            width: 200%;
            cursor: zoom-out;
        }

        .text-panel {
            overflow: auto;
            padding: 1rem;
            border-left: 1px solid var(--border);
            background: #fff;
            -webkit-overflow-scrolling: touch;
        }
        .text-panel .transcription {
            font-family: 'Georgia', serif;
            font-size: 0.9rem;
            line-height: 1.9;
            white-space: pre-wrap;
        }
        .text-panel .notes {
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid #eee;
            font-size: 0.78rem;
            color: var(--muted);
            font-style: italic;
        }
        .text-panel .confidence {
            margin-top: 0.5rem;
            font-size: 0.75rem;
        }
        .conf-high { color: #4a7c59; }
        .conf-medium { color: #b8860b; }
        .conf-low { color: #a0522d; }

        /* --- Mobile: stack vertically --- */
        @media (max-width: 768px) {
            .viewer {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto;
                height: auto;
            }
            .panel-label:nth-child(2) { border-left: none; }
            .img-panel {
                max-height: 50vh;
            }
            .text-panel {
                border-left: none;
                border-top: 1px solid var(--border);
                min-height: 30vh;
            }
            .page-nav button { width: 2.8rem; height: 2.8rem; font-size: 1.3rem; }
        }

        /* --- Footer --- */
        footer {
            padding: 0.6rem 1rem;
            font-size: 0.7rem;
            color: var(--muted);
            text-align: center;
            border-top: 1px solid var(--border);
        }
        footer a { color: var(--accent); }
    </style>
</head>
<body>

<header>
    <h1>SZD-HTR Viewer</h1>
    <div class="sub">Faksimile ↔ Transkription</div>
</header>

<div class="selector" id="objectSelector"></div>
<div class="meta" id="metaBar"></div>
<div class="page-nav">
    <button id="prevBtn" onclick="changePage(-1)">◀</button>
    <span class="page-info" id="pageInfo">1 / 1</span>
    <button id="nextBtn" onclick="changePage(1)">▶</button>
</div>

<div class="viewer">
    <div class="panel-label">Faksimile</div>
    <div class="panel-label">Transkription</div>
    <div class="img-panel" id="imgPanel">
        <img id="faksimile" src="" alt="Faksimile" onclick="toggleZoom(this)">
    </div>
    <div class="text-panel" id="textPanel">
        <div class="transcription" id="transcription"></div>
        <div class="notes" id="notes"></div>
        <div class="confidence" id="confidence"></div>
    </div>
</div>

<footer>
    <a href="https://github.com/chpollin/szd-htr-ocr-pipline">GitHub</a> ·
    <a href="index.html">Ergebnisübersicht</a> ·
    Bilder: <a href="https://gams.uni-graz.at">GAMS</a>, CC-BY Literaturarchiv Salzburg ·
    Modell: Gemini 3.1 Flash Lite
</footer>

<script>

        pages: [
            {
                transcription: "ENTRE LES SOUSSIGNÉS :\n1° Monsieur Stefan ZWEIG ,\ndemeurant à SALZBURG , Kapuzinerberg 5 , AUTRICHE\n\n2° Les Editions BERNARD GRASSET, rue des Saints Pères n° 61.\nIL A ÉTÉ CONVENU CE QUI SUIT :\n\nMonsieur Stefan ZWEIG cède aux Éditions\nBERNARD GRASSET, pour tout le temps que durera sa\npropriété littéraire et celle de ses héritiers, le droit\nexclusif d'imprimer, de publier et de vendre {un} ouvrage\nde sa composition portant comme titre :\nMARIE ANTOINETTE\n\nLa publication aura lieu aux conditions suivantes :\nI. - Il sera d'abord établi une édition dans le format\nin-16 double couronne dont le prix sera déterminé par\nl'éditeur, sur la base du prix actuel de quinze francs.\nII. - Le premier tirage sera de : DIX MILLE EXEMPLAIRES\n\nIII. - Il sera tiré en sus du premier tirage TROIS CENTS\nexemplaires qui seront consacrés au service de presse et\nCINQUANTE exemplaires qui seront remis à l'auteur.\nIV. - Les Éditions BERNARD GRASSET paieront à\nM. Stefan ZWEIG des droits d'auteur de :\nDIX POUR CENT du prix fort de vente jusqu'au\nQUINZIEME MILLE ; QUINZE POUR CENT au delà.\n\n[…Paragraphen V–VII, teils durchgestrichen…]",

        pid: "o:szd.72",
        title: "Tagebuch 1918 — Montreux, September",
        signature: "SZ-AAP/L6",
        date: "[1918]",
        lang: "Deutsch",
        type: "Notizbuch",
        hand: "Stefan Zweig",
        instrument: "Violette Tinte",
        images: [
            "https://gams.uni-graz.at/o:szd.72/IMG.1",
            "https://gams.uni-graz.at/o:szd.72/IMG.2",
            "https://gams.uni-graz.at/o:szd.72/IMG.3",

            {
                transcription: "Montreux 20. September, Freitag.\nDas Tagebuch nach mehr als einem halben Jahre\nwieder aufgenommen. Die Zeit war tot, nun wird sie\nweiterdings grauenhaft lebendig. Ich war müde des\nSinnlosen, nun findet sich allmählich wieder ein Sinn\nder Zeit, oder besser: der immer in dieser Krise verborgene\nSinn beginnt sich zu zeigen. In den letzten Wochen schon,\nseit der denkwürdigen Kriegswende u. der zweiten Mar-\nneschlacht war viel wichtig für mich nebst eigener Arbeit,\njene Polemik vorerst, die mein Aufsatz in der Neuen Zür-\ncher Zeitung erregte, dann die Besprechung mit Gieser,\nder mir seine allerhöchste Unzufriedenheit einschüchternd\nmitteilen wollte u. dabei auf eigene Entschlossenheit stieß\n(denn von dem Cadaver Österreichs lasse ich mich nicht\nmehr einschüchtern u. noch weniger von seinen Diplomaten,\ndie das stille u. beschämliche Land in den Abgrund eines\nfalschen Heroismus gestoßen haben.) Dann eine kurze Stelle\nHoffnung: das Friedensangebot, bald zerschellt an der stei-\nnern fest aufgetürmten Mauer des andern Imperialismus.\nEin wenig Freiheit der Sinne gab dann die Fahrt in die Ber-\nge: ich habe gelernt, gegen den unnützen Flagellantismus\nanzukämpfen, der sich selbst den Tag zerschlägt mit den Ge-\ndankenstrichen. Man muss die Kunst lernen, dumpf zu leben",
                notes: "Sehr gut lesbar, typische Handschrift Zweigs."
            },
            {
                transcription: "sich selbst nur nicht der Zeit, die ja Lebensvernichtung ist,\nHemmung und nicht Befreiung. Hier in Montreux in einem\nkleinen Zimmer hoch über dem See milder Ausblick und\nstillerer Blick nach innen. Das Wetter noch umwölkt aber\nmit Aussicht auf Klärung.\nAbends kommt Chapiro uns besuchen, dieser drollige und\nliebe Kerl. Man hat endlich mit ihm eine echte Heiterkeit, wie\ner von seiner riesenhaften Familie daheim in Kiow erzählt; wenn\ndie auf Reisen gingen, brauchten sie einen ganzen Waggon, sie\nkonnten nie zusammen eine Tramway benützen. So war immer\neine Schar, die Köchin musste zum Einkaufen auf den Markt\nimmer einen Wagen mitfahren. Auch von der Zeit erzählt er\nwo er vom Kirschenpflücken lebte, 10 Centimes das Kilo und\nihm abends alle Gelenke krachten. Aber vom Heitern kommen\nwir zum Ernsten: auch er ist einer, den Rolland „gerettet"\nhat. Auf einen Brief hin, bat er ihn zu sich, hatte immer Zeit\nfür ihn, half ihm in jeder Weise. R. ist jetzt mitten im Kriege\nund auf der Höhe seines Ruhmes noch nicht frei von Geld-\nsorgen, weil er seine ganze Familie ernährt und eine Reihe von\nFreunden unterstützt.",

let currentObj = 0;
let currentPage = 0;

function init() {
    const sel = document.getElementById('objectSelector');
    OBJECTS.forEach((obj, i) => {
        const btn = document.createElement('button');
        btn.textContent = obj.label;
        btn.onclick = () => selectObject(i);
        btn.id = 'obj-btn-' + i;
        sel.appendChild(btn);
    });
    // Check URL hash
    const hash = window.location.hash.slice(1);
    const idx = OBJECTS.findIndex(o => o.id === hash);
    selectObject(idx >= 0 ? idx : 0);
}

function selectObject(i) {
    currentObj = i;
    currentPage = 0;
    document.querySelectorAll('.selector button').forEach((b, j) => {
        b.classList.toggle('active', j === i);
    });
    const obj = OBJECTS[i];
    window.location.hash = obj.id;

    // Meta bar
    document.getElementById('metaBar').innerHTML =
        `<span class="tag tag-${obj.group}">${obj.group}: ${obj.groupLabel}</span>` +
        `<span>${obj.title}</span>` +
        `<span>${obj.pid} · ${obj.signature}</span>` +
        `<span>${obj.lang} · ${obj.type}</span>` +
        `<span>Hand: ${obj.hand}</span>` +
        `<span>${obj.instrument}</span>`;

    renderPage();
}

function renderPage() {
    const obj = OBJECTS[currentObj];
    const page = obj.pages[currentPage];
    const total = obj.pages.length;

    // Page nav
    document.getElementById('pageInfo').textContent = `${currentPage + 1} / ${total}`;
    document.getElementById('prevBtn').disabled = currentPage === 0;
    document.getElementById('nextBtn').disabled = currentPage === total - 1;

    // Image
    const img = document.getElementById('faksimile');
    img.classList.remove('zoomed');
    img.src = obj.images[currentPage] || obj.images[0];
    img.alt = `${obj.title} — Seite ${currentPage + 1}`;

    // Text
    // Render ~~strikethrough~~ as <del>
    let text = page.transcription
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/~~(.+?)~~/g, '<del>$1</del>');
    document.getElementById('transcription').innerHTML = text;
    document.getElementById('notes').textContent = page.notes || '';
    document.getElementById('confidence').innerHTML =
        `Confidence: <span class="conf-${obj.confidence}">${obj.confidence}</span>` +
        ` — ${obj.confidenceNotes}`;
}

function changePage(delta) {
    const obj = OBJECTS[currentObj];
    const next = currentPage + delta;
    if (next >= 0 && next < obj.pages.length) {
        currentPage = next;
        renderPage();
        // Scroll panels to top
        document.getElementById('imgPanel').scrollTop = 0;
        document.getElementById('textPanel').scrollTop = 0;
    }
}

function toggleZoom(img) {
    img.classList.toggle('zoomed');
}

// Swipe support for mobile
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
    const diff = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(diff) > 60) {
        changePage(diff < 0 ? 1 : -1);
    }
});

// Keyboard nav
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') changePage(-1);
    if (e.key === 'ArrowRight') changePage(1);
});

init();
</script>
