<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZD-HTR Viewer — Faksimile ↔ Transkription</title>
    <style>
        :root {
            --bg: #f5f3ef;
            --card: #fff;
            --accent: #8b5e3c;
            --border: #d4c5b0;
            --text: #2c2c2c;
            --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        header {
            background: var(--accent);
            color: #fff;
            padding: 0.8rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 { font-size: 1rem; font-weight: 600; }
        header .sub { font-size: 0.75rem; opacity: 0.8; }

        .collections {
            display: flex;
            gap: 0;
            background: #fff;
            border-bottom: 2px solid var(--border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .collections button {
            flex-shrink: 0;
            padding: 0.5rem 0.9rem;
            border: none;
            background: none;
            font-size: 0.78rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            color: var(--muted);
            transition: all 0.15s;
        }
        .collections button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: 600;
        }

        .selector {
            display: flex;
            gap: 0.4rem;
            padding: 0.6rem 1rem;
            overflow-x: auto;
            background: #fff;
            border-bottom: 1px solid var(--border);
            -webkit-overflow-scrolling: touch;
        }
        .selector button {
            flex-shrink: 0;
            padding: 0.4rem 0.7rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg);
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .selector button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .meta {
            padding: 0.6rem 1rem;
            font-size: 0.78rem;
            color: var(--muted);
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 1rem;
        }
        .tag {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            font-size: 0.72rem;
            font-weight: 600;
        }
        .tag-A { background: #e8d5f0; }
        .tag-B { background: #d5e0f0; }
        .tag-C { background: #f0e4d0; }
        .tag-D { background: #d5f0d8; }
        .tag-E { background: #f0f0d0; }
        .tag-F { background: #f0d5d5; }
        .tag-H { background: #d0e8f0; }
        .tag-I { background: #e0d5f0; }

        .page-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            padding: 0.5rem;
            background: #fff;
            border-bottom: 1px solid var(--border);
        }
        .page-nav button {
            width: 2.5rem;
            height: 2.5rem;
            border: 1px solid var(--border);
            border-radius: 50%;
            background: #fff;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .page-nav button:disabled { opacity: 0.3; cursor: default; }
        .page-nav .page-info {
            font-size: 0.85rem;
            font-weight: 600;
            min-width: 5rem;
            text-align: center;
        }

        .viewer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr;
            height: calc(100vh - 12rem);
            min-height: 400px;
        }
        .panel-label {
            padding: 0.3rem 1rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            background: #faf8f5;
            border-bottom: 1px solid var(--border);
        }
        .panel-label:nth-child(2) { border-left: 1px solid var(--border); }

        .img-panel {
            overflow: auto;
            background: #e8e4de;
            -webkit-overflow-scrolling: touch;
        }
        .img-panel img {
            width: 100%;
            height: auto;
            display: block;
            cursor: zoom-in;
        }
        .img-panel img.zoomed { width: 200%; cursor: zoom-out; }

        .text-panel {
            overflow: auto;
            padding: 1rem;
            border-left: 1px solid var(--border);
            background: #fff;
            -webkit-overflow-scrolling: touch;
        }
        .transcription {
            font-family: 'Georgia', serif;
            font-size: 0.9rem;
            line-height: 1.9;
            white-space: pre-wrap;
        }
        .notes {
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid #eee;
            font-size: 0.78rem;
            color: var(--muted);
            font-style: italic;
        }
        .confidence { margin-top: 0.5rem; font-size: 0.75rem; }
        .conf-high { color: #4a7c59; }
        .conf-medium { color: #b8860b; }
        .conf-low { color: #a0522d; }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .viewer {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto;
                height: auto;
            }
            .panel-label:nth-child(2) { border-left: none; }
            .img-panel { max-height: 50vh; }
            .text-panel { border-left: none; border-top: 1px solid var(--border); min-height: 30vh; }
            .page-nav button { width: 2.8rem; height: 2.8rem; font-size: 1.3rem; }
        }

        footer {
            padding: 0.6rem 1rem;
            font-size: 0.7rem;
            color: var(--muted);
            text-align: center;
            border-top: 1px solid var(--border);
        }
        footer a { color: var(--accent); }
        del { color: #999; text-decoration: line-through; }
    </style>
</head>
<body>

<header>
    <h1>SZD-HTR Viewer</h1>
    <div class="sub">Faksimile ↔ Transkription · Stefan Zweig Digital</div>
</header>

<div class="collections" id="collectionTabs"></div>
<div class="selector" id="objectSelector"></div>
<div class="meta" id="metaBar"></div>
<div class="page-nav">
    <button id="prevBtn" onclick="changePage(-1)">◀</button>
    <span class="page-info" id="pageInfo">1 / 1</span>
    <button id="nextBtn" onclick="changePage(1)">▶</button>
</div>

<div class="viewer" id="viewerPanel">
    <div class="panel-label">Faksimile</div>
    <div class="panel-label">Transkription</div>
    <div class="img-panel" id="imgPanel">
        <img id="faksimile" src="" alt="Faksimile" onclick="toggleZoom(this)">
    </div>
    <div class="text-panel" id="textPanel">
        <div class="transcription" id="transcription"></div>
        <div class="notes" id="notes"></div>
        <div class="confidence" id="confidence"></div>
    </div>
</div>

<footer>
    <a href="https://github.com/chpollin/szd-htr-ocr-pipline">GitHub</a> ·
    <a href="index.html">Übersicht</a> ·
    Bilder: <a href="https://gams.uni-graz.at">GAMS</a>, CC-BY Literaturarchiv Salzburg
</footer>

<script>
let OBJECTS = [];
let COLLECTIONS = [];
let filteredObjects = [];
let selectedCollection = null;
let currentObj = 0;
let currentPage = 0;

const COLLECTION_LABELS = {
    "lebensdokumente": "Lebensdokumente",
    "werke": "Werke",
    "aufsatzablage": "Aufsatzablage",
    "korrespondenzen": "Korrespondenzen"
};

async function init() {
    const panel = document.getElementById('viewerPanel');
    panel.innerHTML = '<div class="loading" style="grid-column:1/-1">Lade Daten…</div>';

    try {
        const resp = await fetch('data.json');
        const data = await resp.json();
        OBJECTS = data.objects;
        COLLECTIONS = data.collections;
    } catch (e) {
        panel.innerHTML = '<div class="loading" style="grid-column:1/-1">Fehler beim Laden der Daten.</div>';
        return;
    }

    panel.innerHTML = `
        <div class="panel-label">Faksimile</div>
        <div class="panel-label">Transkription</div>
        <div class="img-panel" id="imgPanel">
            <img id="faksimile" src="" alt="Faksimile" onclick="toggleZoom(this)">
        </div>
        <div class="text-panel" id="textPanel">
            <div class="transcription" id="transcription"></div>
            <div class="notes" id="notes"></div>
            <div class="confidence" id="confidence"></div>
        </div>`;

    buildCollectionTabs();
    filterAndBuild();

    const hash = window.location.hash.slice(1);
    if (hash) {
        const idx = filteredObjects.findIndex(o => o.id.includes(hash));
        if (idx >= 0) selectObject(idx);
    }
}

function buildCollectionTabs() {
    const tabs = document.getElementById('collectionTabs');
    tabs.innerHTML = '';

    const allBtn = document.createElement('button');
    allBtn.textContent = `Alle (${OBJECTS.length})`;
    allBtn.className = selectedCollection === null ? 'active' : '';
    allBtn.onclick = () => { selectedCollection = null; filterAndBuild(); };
    tabs.appendChild(allBtn);

    for (const col of COLLECTIONS) {
        const count = OBJECTS.filter(o => o.collection === col).length;
        const btn = document.createElement('button');
        btn.textContent = `${COLLECTION_LABELS[col] || col} (${count})`;
        btn.className = selectedCollection === col ? 'active' : '';
        btn.onclick = () => { selectedCollection = col; filterAndBuild(); };
        tabs.appendChild(btn);
    }
}

function filterAndBuild() {
    filteredObjects = selectedCollection
        ? OBJECTS.filter(o => o.collection === selectedCollection)
        : [...OBJECTS];

    buildCollectionTabs();

    const sel = document.getElementById('objectSelector');
    sel.innerHTML = '';
    filteredObjects.forEach((obj, i) => {
        const btn = document.createElement('button');
        btn.textContent = obj.label;
        btn.onclick = () => selectObject(i);
        btn.id = 'obj-btn-' + i;
        sel.appendChild(btn);
    });

    if (filteredObjects.length > 0) {
        selectObject(0);
    }
}

function selectObject(i) {
    currentObj = i;
    currentPage = 0;
    document.querySelectorAll('.selector button').forEach((b, j) => {
        b.classList.toggle('active', j === i);
    });
    const obj = filteredObjects[i];
    window.location.hash = obj.id;

    const col = COLLECTION_LABELS[obj.collection] || obj.collection;
    document.getElementById('metaBar').innerHTML =
        `<span class="tag tag-${obj.group}">${obj.group}: ${obj.groupLabel}</span>` +
        `<span style="font-weight:600">${obj.title}</span>` +
        `<span>${obj.pid} · ${col}</span>` +
        `<span>${obj.lang}</span>` +
        `<span style="font-size:0.7rem;color:#aaa">${obj.model || ''}</span>`;

    renderPage();
}

function renderPage() {
    const obj = filteredObjects[currentObj];
    const pages = obj.pages || [];
    const page = pages[currentPage];
    const total = pages.length;

    document.getElementById('pageInfo').textContent = `${currentPage + 1} / ${total}`;
    document.getElementById('prevBtn').disabled = currentPage === 0;
    document.getElementById('nextBtn').disabled = currentPage === total - 1;

    const img = document.getElementById('faksimile');
    if (img) {
        img.classList.remove('zoomed');
        img.src = (obj.images && obj.images[currentPage]) || '';
        img.alt = `${obj.title} — Seite ${currentPage + 1}`;
    }

    if (page) {
        let text = (page.transcription || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/~~(.+?)~~/g, '<del>$1</del>');
        document.getElementById('transcription').innerHTML = text;
        document.getElementById('notes').textContent = page.notes || '';
    }

    document.getElementById('confidence').innerHTML =
        `Confidence: <span class="conf-${obj.confidence}">${obj.confidence}</span>` +
        (obj.confidenceNotes ? ` — ${obj.confidenceNotes}` : '');
}

function changePage(delta) {
    const obj = filteredObjects[currentObj];
    const next = currentPage + delta;
    if (next >= 0 && next < (obj.pages || []).length) {
        currentPage = next;
        renderPage();
        document.getElementById('imgPanel')?.scrollTo(0, 0);
        document.getElementById('textPanel')?.scrollTo(0, 0);
    }
}

function toggleZoom(img) { img.classList.toggle('zoomed'); }

let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
    const diff = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(diff) > 60) changePage(diff < 0 ? 1 : -1);
});

document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') changePage(-1);
    if (e.key === 'ArrowRight') changePage(1);
});

init();
</script>

</body>
</html>
